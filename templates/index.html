<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAIVIK Translation Work</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

/* Navbar */
.navbar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
}

.navbar img {
    height: 50px;
}

/* Container */
.container {
    width: 90%;
    margin: auto;
    padding: 30px 0;
}

/* Glass Card */
.card {
    background: rgba(255,255,255,0.15);
    padding: 25px;
    border-radius: 20px;
    margin: 20px auto;
    width: 80%;
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* Inputs */
input, textarea {
    width: 95%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

/* Button */
.btn {
    background: linear-gradient(45deg, #ff7e5f, #feb47b);
    color: white;
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* Output */
.output {
    margin-top: 10px;
    color: lightgreen;
    font-weight: bold;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    color: white;
}
</style>

</head>

<body>

<div class="navbar">
    <img src="{{ url_for('static', filename='logo.png') }}">
    <span>DAIVIK Translation Work</span>
    <a href="/dashboard">
        <button class="btn">Dashboard</button>
    </a>
</div>

<div class="container">

<!-- 🤖 AI Translator -->
<div class="card">
<h2>🤖 AI Translator</h2>

<form method="POST">
<textarea name="translate_text" placeholder="Enter English text"></textarea>
<br>
<button class="btn">Translate</button>
</form>

<div class="output">{{ translated }}</div>
</div>

<!-- 📩 Contact Form -->
<div class="card">
<h2>📩 Contact Us</h2>

<form method="POST">
<input name="name" placeholder="Your Name" required>
<input name="email" placeholder="Your Email" required>
<input name="phone" placeholder="Phone Number" required>
<textarea name="message" placeholder="Work Details"></textarea>

<button class="btn">Submit</button>
</form>
<h2 style="margin-top:40px;">Upload Translation File</h2>

<h3>Upload File</h3>

<form method="POST"
action="/upload_translation"
enctype="multipart/form-data">

<input
type="text"
name="name"
placeholder="Your Name"
required>

<input
type="email"
name="email"
placeholder="Your Email"
required>

<input
type="text"
name="phone"
placeholder="Phone Number"
required>

<input
type="file"
name="file"
required>

<button class="btn">
Upload File
</button>

</form>
<p style="color:lightgreen;">{{ message }}</p>

<a href="https://wa.me/91XXXXXXXXXX" target="_blank">
    <button class="btn">Chat on WhatsApp</button>
</a>

</div>

</div>

<footer>
© 2026 DAIVIK Translation Work
</footer>

</body>
</html>
