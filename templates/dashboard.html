<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>

<body>

<h2>Client Dashboard</h2>

<table border="1">
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Message</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row.name }}</td>
<td>{{ row.email }}</td>
<td>{{ row.phone }}</td>
<td>{{ row.message }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
