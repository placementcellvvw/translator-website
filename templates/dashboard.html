<!DOCTYPE html>
<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    padding:40px;
}

.card{
    background:#222;
    padding:20px;
    margin-bottom:20px;
    border-radius:15px;
}

.btn{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    text-decoration:none;
}

.lock{
    color:#ff5252;
    font-weight:bold;
}
</style>

</head>
<body>

<h1>Uploaded Translation Files</h1>

{% for file in files %}

<div class="card">

<h3>{{ file.filename }}</h3>

<p>Name: {{ file.customer_name }}</p>

<p>Email: {{ file.email }}</p>

{% if file.paid %}

<a class="btn" href="/download/{{ file.translated_file }}">
Download Translated File
</a>

{% else %}

<p class="lock">
🔒 Payment Required Before Download
</p>

<img
src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=upi://pay?pa=9818354183@ybl&pn=DAIVIK Translation Work&am=99&cu=INR">

<p>Pay ₹49 per page and contact admin on WhatsApp</p>

{% endif %}

</div>

{% endfor %}

</body>
</html>
