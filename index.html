<!DOCTYPE html>
<html>
<head>
<title>DAIVIK Translation Work</title>
<style>
body { font-family: Arial; background: linear-gradient(to right, #36d1dc, #5b86e5); text-align: center; color: white; }
.box { background: white; color: black; padding: 30px; margin: 30px auto; width: 60%; border-radius: 15px; }
input, textarea { width: 80%; padding: 10px; margin: 10px; }
button { background: #36d1dc; color: white; padding: 10px 20px; border: none; border-radius: 20px; }
</style>
</head>
<body>
<h1>🌐 Professional English → Hindi Translation Service</h1>
<div class="box">
<form method="POST">
<input name="name" placeholder="Name" required><br>
<input name="email" placeholder="Email" required><br>
<input name="phone" placeholder="Phone" required><br>
<textarea name="message" placeholder="Work Details"></textarea><br>
<button type="submit">Submit</button>
</form>
<p>{{ Daivik Translation Works }}</p>
</div>
  <div class="card">
<h2>🤖 AI Translator</h2>

<form method="POST">
<textarea name="translate_text" placeholder="Enter English text"></textarea>
<br>
<button class="btn">Translate to Hindi</button>
</form>

<h3 style="color:lightgreen;">{{ translated }}</h3>
</div>
</body>
</html>
