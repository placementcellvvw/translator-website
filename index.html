<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAIVIK Translation Work</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

/* Navbar */
.navbar {
    position: sticky;
    top: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

/* Section */
.section {
    width: 80%;
    margin: auto;
    padding: 40px 0;
}

/* Card */
.card {
    background: rgba(255,255,255,0.1);
    padding: 25px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    margin: 20px 0;
}

/* Input */
input, textarea {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    border: none;
}

/* Button */
.btn {
    background: linear-gradient(45deg, #ff512f, #dd2476);
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}

/* WhatsApp */
.whatsapp {
    display: inline-block;
    margin-top: 20px;
    background: #25D366;
    padding: 12px 25px;
    border-radius: 30px;
    color: white;
    text-decoration: none;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
}
</style>

</head>

<body>

<div class="navbar">
🌐 DAIVIK Translation Work
</div>

<div class="section">

<!-- 🤖 AI TRANSLATOR -->
<div class="card">
<h2>🤖 AI Translator</h2>

<form method="POST">
<textarea name="translate_text" placeholder="Enter English text"></textarea>
<br>
<button class="btn">Translate to Hindi</button>
</form>

<h3 style="color:lightgreen;">{{ translated }}</h3>
</div>

 <div class="payment-box">

    <h2>Scan & Pay</h2>

    <img 
    src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=9818354183@ybl&pn=DAIVIK Translation Work&am=99&cu=INR"
    alt="UPI QR Code">

    <h3>UPI ID: 9818354183@ybl</h3>
    <p>Amount: ₹99</p>

</div>   
    
<!-- 📩 CONTACT FORM -->
<div class="card">
<h2>📩 Contact Us</h2>

<form method="POST">
<input name="name" placeholder="Name" required>
<input name="email" placeholder="Email" required>
<input name="phone" placeholder="Phone" required>
<textarea name="message" placeholder="Work Details"></textarea>
<button class="btn">Submit</button>
</form>

<p style="color:lightgreen;">{{ message }}</p>
<h3>Upload File</h3>

<form method="POST" action="/upload" enctype="multipart/form-data">
<input type="file" name="file">
<button class="btn">Upload</button>
</form>
<a class="whatsapp" href="https://wa.me/918851304467">
💬 Chat on WhatsApp
</a>

</div>

</div>

<footer>
© 2026 DAIVIK Translation Work
</footer>

</body>
</html>
